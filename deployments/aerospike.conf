service {
	cluster-name docker
}

logging {
	console {
		context any warning
	}
}

network {
	service {
		address any
		port 3000
	}
	heartbeat {
		mode mesh
		address local
		port 3002
	}
	fabric {
		address local
		port 3001
	}
}

namespace test {
	replication-factor 1
	default-ttl 0
	nsup-period 1
	storage-engine memory {
		data-size 256M
	}
}
